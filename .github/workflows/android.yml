name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Run Static Analysis (Detekt)
      run: ./gradlew detekt

    - name: Run Unit Tests
      run: ./gradlew test -PDISCOGS_TOKEN=${{ secrets.DISCOGS_TOKEN }}

    - name: Build Debug APK
      run: ./gradlew assembleDebug -PDISCOGS_TOKEN=${{ secrets.DISCOGS_TOKEN }}
